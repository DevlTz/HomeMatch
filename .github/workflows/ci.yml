name: CI — HomeMatch

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pylint bandit coverage

      - name: Black — verificar formatação
        run: black --check .

      - name: Flake8 — linting
        run: flake8 --max-line-length=88 --exclude=migrations,venv --extend-ignore=F401 apps/


      - name: Bandit — segurança
        run: bandit -r apps/ -x apps/*/migrations

      - name: Pylint
        run: pylint apps/ --disable=C0114,C0115,C0116 --ignore=migrations

  tests:
    name: Testes
    runs-on: ubuntu-latest
    needs: quality

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: homematch_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DEBUG: True
      SECRET_KEY: ci-secret-key-nao-usar-em-producao
      DB_NAME: homematch_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar migrations
        run: python manage.py migrate

      - name: Rodar testes com coverage
        run: |
          coverage run --source='.' manage.py test
          coverage report --fail-under=0